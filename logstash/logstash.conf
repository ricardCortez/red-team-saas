input {
  tcp {
    port => 5000
    codec => json
  }

  file {
    path => "/var/log/app/*.log"
    start_position => "beginning"
    sincedb_path => "/dev/null"
    codec => json
  }
}

filter {
  if [type] == "application" {
    grok {
      match => {
        "message" => "%{TIMESTAMP_ISO8601:timestamp} %{LOGLEVEL:level} %{DATA:logger} %{GREEDYDATA:message}"
      }
      overwrite => ["message"]
    }

    date {
      match => ["timestamp", "ISO8601"]
      target => "@timestamp"
    }

    if [level] == "ERROR" or [level] == "CRITICAL" {
      mutate {
        add_field => { "alert_required" => "true" }
        add_tag => ["alert"]
      }
    }
  }

  if [type] == "security" {
    grok {
      match => {
        "message" => "%{TIMESTAMP_ISO8601:timestamp} %{LOGLEVEL:level} %{IP:client_ip} %{DATA:event_type} %{GREEDYDATA:details}"
      }
    }

    date {
      match => ["timestamp", "ISO8601"]
      target => "@timestamp"
    }

    geoip {
      source => "client_ip"
      target => "geoip"
    }
  }

  if [type] == "audit" {
    mutate {
      add_field => { "index_prefix" => "audit" }
    }
  }

  mutate {
    remove_field => ["host", "path"]
  }
}

output {
  elasticsearch {
    hosts => ["elasticsearch:9200"]
    index => "logs-%{+YYYY.MM.dd}"
    template_name => "red-team-saas"
  }

  if "alert" in [tags] {
    stdout {
      codec => rubydebug
    }
  }
}
