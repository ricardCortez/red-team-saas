apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources
  namespace: red-team-saas
data:
  prometheus.yaml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        access: proxy
        url: http://prometheus:9090
        isDefault: true
        editable: true
      - name: Elasticsearch
        type: elasticsearch
        access: proxy
        url: http://elasticsearch:9200
        database: logs-*
        jsonData:
          timeField: "@timestamp"
          logMessageField: message
          logLevelField: level
          esVersion: "8.0.0"
        editable: true
