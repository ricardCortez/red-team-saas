#version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: redteam-postgres
    environment:
      POSTGRES_USER: redteam
      POSTGRES_PASSWORD: password
      POSTGRES_DB: redteam_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U redteam"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: redteam-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: redteam-api
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    environment:
      - DATABASE_URL=postgresql://redteam:password@postgres:5432/redteam_db
      - REDIS_URL=redis://redis:6379/0
      - DEBUG=True
      - GOPHISH_URL=https://gophish:3333
      - GOPHISH_API_KEY=8e1807cff895c10ea4a9f79189d1645071e033105bc3545435d21c2c79d01717
      - GOPHISH_PHISHING_URL=http://localhost:8080
    volumes:
      - ./backend:/app
      - ./logs:/app/logs
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: redteam-celery-worker
    command: celery -A app.tasks.celery_app worker --loglevel=info -Q tool_execution,notifications,analytics,reports,celery --concurrency=4
    environment:
      - DATABASE_URL=postgresql://redteam:password@postgres:5432/redteam_db
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=${SECRET_KEY:-change-me-in-production}
    volumes:
      - ./backend:/app
      - ./logs:/app/logs
    cap_add:
      - NET_RAW
      - NET_ADMIN
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  celery_beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: redteam-celery-beat
    command: celery -A app.tasks.celery_app beat --loglevel=info
    environment:
      - DATABASE_URL=postgresql://redteam:password@postgres:5432/redteam_db
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=${SECRET_KEY:-change-me-in-production}
    volumes:
      - ./backend:/app
    depends_on:
      - redis

  flower:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: redteam-flower
    command: celery -A app.tasks.celery_app flower --port=5555
    ports:
      - "5555:5555"
    environment:
      - REDIS_URL=redis://redis:6379/0
      - FLOWER_UNAUTHENTICATED_API=true
    depends_on:
      - redis

  prometheus:
    image: prom/prometheus:latest
    container_name: redteam-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:9090"]
      interval: 10s
      timeout: 5s
      retries: 5

  grafana:
    image: grafana/grafana:latest
    container_name: redteam-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_SECURITY_ADMIN_USER=admin
    volumes:
      - grafana_data:/var/lib/grafana
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000"]
      interval: 10s
      timeout: 5s
      retries: 5

  gophish:
    image: gophish/gophish:latest
    container_name: redteam-gophish
    ports:
      - "3333:3333"
      - "8080:8080"
    volumes:
      - gophish_data:/opt/gophish
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "--no-check-certificate", "https://localhost:3333"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

volumes:
  postgres_data:
  redis_data:
  prometheus_data:
  grafana_data:
  gophish_data:

networks:
  default:
    name: redteam-network