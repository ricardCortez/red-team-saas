services:
  postgres:
    image: postgres:15-alpine
    container_name: redteam-postgres-staging
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data_staging:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - redteam-staging-network

  redis:
    image: redis:7-alpine
    container_name: redteam-redis-staging
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data_staging:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - redteam-staging-network

  backend:
    image: ${REGISTRY}/red-team-saas:${VERSION}
    container_name: redteam-backend-staging
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      ENVIRONMENT: ${ENVIRONMENT}
      DEBUG: ${DEBUG}
      SECRET_KEY: ${SECRET_KEY}
      JWT_ALGORITHM: ${JWT_ALGORITHM}
      JWT_EXPIRATION_HOURS: ${JWT_EXPIRATION_HOURS}
      API_BASE_URL: ${API_BASE_URL}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - redteam-staging-network

  celery-worker:
    image: ${REGISTRY}/red-team-saas:${VERSION}
    container_name: redteam-celery-worker-staging
    command: celery -A app.tasks.celery_app worker --loglevel=info -Q tool_execution,celery --concurrency=4
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      ENVIRONMENT: ${ENVIRONMENT}
      SECRET_KEY: ${SECRET_KEY}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - redteam-staging-network

  celery-beat:
    image: ${REGISTRY}/red-team-saas:${VERSION}
    container_name: redteam-celery-beat-staging
    command: celery -A app.tasks.celery_app beat --loglevel=info
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      ENVIRONMENT: ${ENVIRONMENT}
      SECRET_KEY: ${SECRET_KEY}
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - redteam-staging-network

  flower:
    image: mher/flower:2.0.1
    container_name: redteam-flower-staging
    ports:
      - "5555:5555"
    environment:
      CELERY_BROKER_URL: ${REDIS_URL}
      FLOWER_PORT: 5555
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - redteam-staging-network

volumes:
  postgres_data_staging:
  redis_data_staging:

networks:
  redteam-staging-network:
    name: redteam-staging-network
