services:
  postgres:
    image: postgres:15-alpine
    container_name: redteam-postgres-dev
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-redteam}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: ${POSTGRES_DB:-redteam_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-redteam}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - redteam-network

  redis:
    image: redis:7-alpine
    container_name: redteam-redis-dev
    ports:
      - "6379:6379"
    volumes:
      - redis_data_dev:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - redteam-network

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: redteam-backend-dev
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://redteam:password@postgres:5432/redteam_db}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      ENVIRONMENT: ${ENVIRONMENT:-development}
      DEBUG: ${DEBUG:-true}
      SECRET_KEY: ${SECRET_KEY:-dev-secret-key-change-in-production}
    ports:
      - "8000:8000"
    volumes:
      - ./app:/app/app
      - ./alembic:/app/alembic
      - ./logs:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - redteam-network

  celery-worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: redteam-celery-worker-dev
    command: celery -A app.tasks.celery_app worker --loglevel=info -Q tool_execution,celery --concurrency=4
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://redteam:password@postgres:5432/redteam_db}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      ENVIRONMENT: ${ENVIRONMENT:-development}
      DEBUG: ${DEBUG:-true}
      SECRET_KEY: ${SECRET_KEY:-dev-secret-key-change-in-production}
    volumes:
      - ./app:/app/app
      - ./logs:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - redteam-network

  celery-beat:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: redteam-celery-beat-dev
    command: celery -A app.tasks.celery_app beat --loglevel=info
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://redteam:password@postgres:5432/redteam_db}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      ENVIRONMENT: ${ENVIRONMENT:-development}
      SECRET_KEY: ${SECRET_KEY:-dev-secret-key-change-in-production}
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - redteam-network

  flower:
    image: mher/flower:2.0.1
    container_name: redteam-flower-dev
    ports:
      - "5555:5555"
    environment:
      CELERY_BROKER_URL: ${REDIS_URL:-redis://redis:6379/0}
      FLOWER_PORT: 5555
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - redteam-network

volumes:
  postgres_data_dev:
  redis_data_dev:

networks:
  redteam-network:
    name: redteam-network
