# NOTE: In production use sealed-secrets or external-secrets operator.
# Never commit plaintext secrets to version control.
apiVersion: v1
kind: Secret
metadata:
  name: redteam-secrets
  namespace: red-team-saas
  labels:
    app: red-team-saas
type: Opaque
stringData:
  DATABASE_URL: "postgresql://redteam:CHANGE_ME@postgres:5432/redteam_db"
  REDIS_URL: "redis://:CHANGE_ME@redis:6379/0"
  SECRET_KEY: "CHANGE_ME_TO_A_RANDOM_64_CHAR_STRING"
  AWS_ACCESS_KEY_ID: "CHANGE_ME"
  AWS_SECRET_ACCESS_KEY: "CHANGE_ME"
  AWS_REGION: "us-east-1"
  AWS_S3_BUCKET: "redteam-saas-bucket"
  GITHUB_CLIENT_ID: "CHANGE_ME"
  GITHUB_CLIENT_SECRET: "CHANGE_ME"
  GOOGLE_CLIENT_ID: "CHANGE_ME"
  GOOGLE_CLIENT_SECRET: "CHANGE_ME"
